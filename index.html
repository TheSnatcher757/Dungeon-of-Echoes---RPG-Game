<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dungeon of Echoes - Roguelike</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #08080c; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; }
  canvas { image-rendering: pixelated; }
  #hud {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 20px; color: #8a9ab5; font-size: 12px; font-weight: 600;
    text-shadow: 0 1px 3px rgba(0,0,0,0.9); pointer-events: none; z-index: 10;
  }
  #hud .val { color: #c8d8f0; }
  #hud .hp { color: #ef4444; }
  #hud .gold { color: #fbbf24; }
  #hud .lvl { color: #8b5cf6; }
  #log {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    color: #4a5568; font-size: 11px; text-shadow: 0 1px 3px rgba(0,0,0,0.9);
    pointer-events: none; z-index: 10; text-align: center; max-width: 600px;
  }
</style>
</head>
<body>
<div id="hud">
  <span>HP <span class="hp val" id="hp">20/20</span></span>
  <span>ATK <span class="val" id="atk">5</span></span>
  <span>DEF <span class="val" id="def">2</span></span>
  <span>LVL <span class="lvl val" id="lvl">1</span></span>
  <span>XP <span class="val" id="xp">0/10</span></span>
  <span>GOLD <span class="gold val" id="gold">0</span></span>
  <span>FLOOR <span class="val" id="floor">1</span></span>
</div>
<canvas id="game"></canvas>
<div id="log" id="log"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = 800, H = 560;
canvas.width = W; canvas.height = H;
const s = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.9, 800);
canvas.style.width = s + "px";
canvas.style.height = (s * H / W) + "px";

const TILE = 24;
const COLS = Math.floor(W / TILE);
const ROWS = Math.floor(H / TILE);
const FOV_RADIUS = 7;

// Tile types
const WALL = 0, FLOOR = 1, DOOR = 2, STAIRS = 3, CHEST = 4, TRAP = 5;

let gameState = "title";
let logMsg = "Arrow keys or WASD to move. Bump enemies to attack.";
let logTimer = 0;

// ── Player ─────────────────────────────
let player = {
  x: 5, y: 5, hp: 20, maxHp: 20, atk: 5, def: 2,
  level: 1, xp: 0, xpNext: 10, gold: 0, floor: 1,
  inventory: [], keys: 0,
};

// ── Entities ───────────────────────────
let enemies = [];
let items = [];
let map = [];
let revealed = [];
let particles = [];
let floatingTexts = [];
let turnCount = 0;

// ── Dungeon Generation ─────────────────
function generateDungeon(floor) {
  map = Array.from({ length: ROWS }, () => Array(COLS).fill(WALL));
  revealed = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  enemies = [];
  items = [];
  particles = [];

  const rooms = [];
  const maxRooms = 8 + Math.min(floor, 6);
  const minSize = 3, maxSize = 7;

  for (let attempt = 0; attempt < 80; attempt++) {
    const w = minSize + Math.floor(Math.random() * (maxSize - minSize));
    const h = minSize + Math.floor(Math.random() * (maxSize - minSize));
    const x = 1 + Math.floor(Math.random() * (COLS - w - 2));
    const y = 1 + Math.floor(Math.random() * (ROWS - h - 2));

    let overlap = false;
    for (const r of rooms) {
      if (x - 1 < r.x + r.w && x + w + 1 > r.x && y - 1 < r.y + r.h && y + h + 1 > r.y) {
        overlap = true; break;
      }
    }
    if (overlap) continue;

    rooms.push({ x, y, w, h });
    for (let ry = y; ry < y + h; ry++)
      for (let rx = x; rx < x + w; rx++)
        map[ry][rx] = FLOOR;

    if (rooms.length >= maxRooms) break;
  }

  // Connect rooms with corridors
  for (let i = 1; i < rooms.length; i++) {
    const a = rooms[i - 1], b = rooms[i];
    const ax = Math.floor(a.x + a.w / 2), ay = Math.floor(a.y + a.h / 2);
    const bx = Math.floor(b.x + b.w / 2), by = Math.floor(b.y + b.h / 2);

    let cx = ax, cy = ay;
    while (cx !== bx) {
      if (cy >= 0 && cy < ROWS && cx >= 0 && cx < COLS) map[cy][cx] = FLOOR;
      cx += cx < bx ? 1 : -1;
    }
    while (cy !== by) {
      if (cy >= 0 && cy < ROWS && cx >= 0 && cx < COLS) map[cy][cx] = FLOOR;
      cy += cy < by ? 1 : -1;
    }
  }

  // Place player in first room
  player.x = Math.floor(rooms[0].x + rooms[0].w / 2);
  player.y = Math.floor(rooms[0].y + rooms[0].h / 2);

  // Place stairs in last room
  const last = rooms[rooms.length - 1];
  const sx = Math.floor(last.x + last.w / 2);
  const sy = Math.floor(last.y + last.h / 2);
  map[sy][sx] = STAIRS;

  // Place enemies
  const enemyTypes = [
    { name: "Rat", ch: "r", color: "#8b7355", hp: 4 + floor, atk: 2 + floor, def: 0, xp: 3, gold: 1 },
    { name: "Goblin", ch: "g", color: "#4a9e4a", hp: 6 + floor * 2, atk: 3 + floor, def: 1, xp: 5, gold: 3 },
    { name: "Skeleton", ch: "s", color: "#c8c8c8", hp: 8 + floor * 2, atk: 4 + floor, def: 2, xp: 8, gold: 5 },
    { name: "Demon", ch: "D", color: "#d44", hp: 15 + floor * 3, atk: 6 + floor, def: 3, xp: 15, gold: 10 },
  ];

  const numEnemies = 4 + floor * 2;
  for (let i = 0; i < numEnemies; i++) {
    const roomIdx = 1 + Math.floor(Math.random() * (rooms.length - 1));
    const room = rooms[roomIdx];
    const ex = room.x + 1 + Math.floor(Math.random() * (room.w - 2));
    const ey = room.y + 1 + Math.floor(Math.random() * (room.h - 2));
    if (map[ey][ex] !== FLOOR) continue;
    if (ex === player.x && ey === player.y) continue;

    const tier = Math.min(Math.floor(Math.random() * (1 + floor * 0.5)), enemyTypes.length - 1);
    const type = enemyTypes[tier];
    enemies.push({
      ...type, x: ex, y: ey,
      maxHp: type.hp, alive: true,
    });
  }

  // Place items
  const itemTypes = [
    { name: "Health Potion", ch: "!", color: "#ef4444", type: "heal", value: 8 + floor * 2 },
    { name: "Str Scroll", ch: "?", color: "#f59e0b", type: "buff_atk", value: 1 },
    { name: "Armor Shard", ch: "+", color: "#3b82f6", type: "buff_def", value: 1 },
    { name: "Gold Pile", ch: "$", color: "#fbbf24", type: "gold", value: 5 + floor * 3 },
  ];

  const numItems = 3 + floor;
  for (let i = 0; i < numItems; i++) {
    const roomIdx = Math.floor(Math.random() * rooms.length);
    const room = rooms[roomIdx];
    const ix = room.x + 1 + Math.floor(Math.random() * (room.w - 2));
    const iy = room.y + 1 + Math.floor(Math.random() * (room.h - 2));
    if (map[iy][ix] !== FLOOR) continue;

    const type = itemTypes[Math.floor(Math.random() * itemTypes.length)];
    items.push({ ...type, x: ix, y: iy, picked: false });
  }

  // Place traps in later floors
  if (floor >= 2) {
    const numTraps = floor;
    for (let i = 0; i < numTraps; i++) {
      const roomIdx = 1 + Math.floor(Math.random() * (rooms.length - 1));
      const room = rooms[roomIdx];
      const tx = room.x + 1 + Math.floor(Math.random() * (room.w - 2));
      const ty = room.y + 1 + Math.floor(Math.random() * (room.h - 2));
      if (map[ty][tx] === FLOOR) map[ty][tx] = TRAP;
    }
  }
}

// ── FOV ────────────────────────────────
function computeFOV() {
  for (let dy = -FOV_RADIUS; dy <= FOV_RADIUS; dy++) {
    for (let dx = -FOV_RADIUS; dx <= FOV_RADIUS; dx++) {
      if (dx * dx + dy * dy > FOV_RADIUS * FOV_RADIUS) continue;
      const tx = player.x + dx, ty = player.y + dy;
      if (tx < 0 || tx >= COLS || ty < 0 || ty >= ROWS) continue;

      let visible = true;
      const steps = Math.max(Math.abs(dx), Math.abs(dy));
      for (let s = 1; s < steps; s++) {
        const cx = Math.round(player.x + dx * s / steps);
        const cy = Math.round(player.y + dy * s / steps);
        if (cx >= 0 && cx < COLS && cy >= 0 && cy < ROWS && map[cy][cx] === WALL) {
          visible = false; break;
        }
      }
      if (visible) revealed[ty][tx] = true;
    }
  }
}

// ── Combat ─────────────────────────────
function attack(attacker, defender) {
  const dmg = Math.max(1, attacker.atk - defender.def + Math.floor(Math.random() * 3) - 1);
  defender.hp -= dmg;
  spawnParticles(defender.x * TILE + TILE / 2, defender.y * TILE + TILE / 2, "#ef4444", 6, 2);
  floatingTexts.push({ x: defender.x * TILE + TILE / 2, y: defender.y * TILE, text: `-${dmg}`, color: "#ef4444", life: 40 });
  return dmg;
}

function checkLevelUp() {
  while (player.xp >= player.xpNext) {
    player.xp -= player.xpNext;
    player.level++;
    player.xpNext = Math.floor(player.xpNext * 1.5);
    player.maxHp += 5;
    player.hp = player.maxHp;
    player.atk += 1;
    player.def += 1;
    setLog(`Level up! You are now level ${player.level}!`);
    spawnParticles(player.x * TILE + TILE / 2, player.y * TILE + TILE / 2, "#8b5cf6", 15, 4);
    floatingTexts.push({ x: player.x * TILE + TILE / 2, y: player.y * TILE - 10, text: "LEVEL UP!", color: "#8b5cf6", life: 60 });
  }
}

// ── Items ──────────────────────────────
function pickupItem() {
  const item = items.find(i => !i.picked && i.x === player.x && i.y === player.y);
  if (!item) return;
  item.picked = true;

  if (item.type === "heal") {
    const healed = Math.min(item.value, player.maxHp - player.hp);
    player.hp += healed;
    setLog(`Used ${item.name}. Healed ${healed} HP.`);
    floatingTexts.push({ x: player.x * TILE + TILE / 2, y: player.y * TILE, text: `+${healed}`, color: "#10b981", life: 40 });
  } else if (item.type === "buff_atk") {
    player.atk += item.value;
    setLog(`${item.name}! ATK +${item.value}`);
    floatingTexts.push({ x: player.x * TILE + TILE / 2, y: player.y * TILE, text: `ATK+${item.value}`, color: "#f59e0b", life: 40 });
  } else if (item.type === "buff_def") {
    player.def += item.value;
    setLog(`${item.name}! DEF +${item.value}`);
    floatingTexts.push({ x: player.x * TILE + TILE / 2, y: player.y * TILE, text: `DEF+${item.value}`, color: "#3b82f6", life: 40 });
  } else if (item.type === "gold") {
    player.gold += item.value;
    setLog(`Found ${item.value} gold!`);
    floatingTexts.push({ x: player.x * TILE + TILE / 2, y: player.y * TILE, text: `+${item.value}g`, color: "#fbbf24", life: 40 });
  }
  spawnParticles(player.x * TILE + TILE / 2, player.y * TILE + TILE / 2, item.color, 8, 3);
}

// ── Enemy AI ───────────────────────────
function moveEnemies() {
  enemies.forEach(e => {
    if (!e.alive) return;
    const dx = player.x - e.x, dy = player.y - e.y;
    const dist = Math.abs(dx) + Math.abs(dy);
    if (dist > FOV_RADIUS + 2) return; // Too far, don't move

    if (dist === 1) {
      // Attack player
      const dmg = attack(e, player);
      setLog(`${e.name} hits you for ${dmg} damage!`);
      if (player.hp <= 0) { gameState = "dead"; setLog("You died! Press ENTER to restart."); }
      return;
    }

    // Simple pathfinding toward player
    let mx = 0, my = 0;
    if (Math.abs(dx) >= Math.abs(dy)) mx = dx > 0 ? 1 : -1;
    else my = dy > 0 ? 1 : -1;

    const nx = e.x + mx, ny = e.y + my;
    if (nx >= 0 && nx < COLS && ny >= 0 && ny < ROWS && map[ny][nx] !== WALL) {
      const blocked = enemies.some(o => o.alive && o !== e && o.x === nx && o.y === ny);
      if (!blocked && !(nx === player.x && ny === player.y)) {
        e.x = nx; e.y = ny;
      }
    }
  });
}

// ── Player Move ────────────────────────
function movePlayer(dx, dy) {
  if (gameState !== "playing") return;
  const nx = player.x + dx, ny = player.y + dy;
  if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS) return;
  if (map[ny][nx] === WALL) return;

  // Check for enemy
  const enemy = enemies.find(e => e.alive && e.x === nx && e.y === ny);
  if (enemy) {
    const dmg = attack(player, enemy);
    setLog(`You hit ${enemy.name} for ${dmg}! ${enemy.hp > 0 ? `(${enemy.hp}hp left)` : ""}`);
    if (enemy.hp <= 0) {
      enemy.alive = false;
      player.xp += enemy.xp;
      player.gold += enemy.gold;
      setLog(`${enemy.name} defeated! +${enemy.xp}xp +${enemy.gold}g`);
      checkLevelUp();
    }
  } else {
    player.x = nx;
    player.y = ny;

    // Check stairs
    if (map[ny][nx] === STAIRS) {
      player.floor++;
      setLog(`Descending to floor ${player.floor}...`);
      generateDungeon(player.floor);
      computeFOV();
      return;
    }

    // Check trap
    if (map[ny][nx] === TRAP) {
      const dmg = 2 + player.floor;
      player.hp -= dmg;
      map[ny][nx] = FLOOR;
      setLog(`Trap! You take ${dmg} damage!`);
      floatingTexts.push({ x: nx * TILE + TILE / 2, y: ny * TILE, text: `-${dmg}`, color: "#f59e0b", life: 40 });
      spawnParticles(nx * TILE + TILE / 2, ny * TILE + TILE / 2, "#f59e0b", 8, 3);
      if (player.hp <= 0) { gameState = "dead"; setLog("You died! Press ENTER to restart."); }
    }

    pickupItem();
  }

  turnCount++;
  moveEnemies();
  computeFOV();
}

// ── Particles & Effects ────────────────
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = Math.random() * speed;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
      life: 1, decay: 0.02 + Math.random() * 0.02, size: 2 + Math.random() * 2, color,
    });
  }
}

function setLog(msg) { logMsg = msg; logTimer = 180; }

// ── Rendering ──────────────────────────
function isInFOV(tx, ty) {
  const dx = tx - player.x, dy = ty - player.y;
  return dx * dx + dy * dy <= FOV_RADIUS * FOV_RADIUS;
}

function draw() {
  ctx.fillStyle = "#08080c";
  ctx.fillRect(0, 0, W, H);

  if (gameState === "title") { drawTitle(); return; }

  // Draw map
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) {
      if (!revealed[y][x]) continue;
      const inFov = isInFOV(x, y);
      const alpha = inFov ? 1 : 0.3;
      const px = x * TILE, py = y * TILE;

      if (map[y][x] === WALL) {
        ctx.fillStyle = `rgba(28, 32, 48, ${alpha})`;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.strokeStyle = `rgba(40, 48, 68, ${alpha * 0.5})`;
        ctx.strokeRect(px + 0.5, py + 0.5, TILE - 1, TILE - 1);
      } else if (map[y][x] === FLOOR) {
        ctx.fillStyle = `rgba(18, 20, 30, ${alpha})`;
        ctx.fillRect(px, py, TILE, TILE);
        if ((x + y) % 2 === 0) {
          ctx.fillStyle = `rgba(22, 24, 36, ${alpha})`;
          ctx.fillRect(px, py, TILE, TILE);
        }
      } else if (map[y][x] === STAIRS) {
        ctx.fillStyle = `rgba(18, 20, 30, ${alpha})`;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = `rgba(139, 92, 246, ${alpha * (0.6 + Math.sin(Date.now() * 0.004) * 0.3)})`;
        ctx.font = "bold 18px monospace";
        ctx.textAlign = "center";
        ctx.fillText(">", px + TILE / 2, py + TILE / 2 + 6);
      } else if (map[y][x] === TRAP) {
        ctx.fillStyle = `rgba(18, 20, 30, ${alpha})`;
        ctx.fillRect(px, py, TILE, TILE);
        if (inFov && Math.abs(x - player.x) + Math.abs(y - player.y) <= 2) {
          ctx.fillStyle = `rgba(245, 158, 11, ${alpha * 0.4})`;
          ctx.font = "14px monospace";
          ctx.textAlign = "center";
          ctx.fillText("^", px + TILE / 2, py + TILE / 2 + 4);
        }
      }
    }
  }

  // Draw items
  items.forEach(item => {
    if (item.picked || !revealed[item.y][item.x]) return;
    const inFov = isInFOV(item.x, item.y);
    if (!inFov) return;
    const bob = Math.sin(Date.now() * 0.004 + item.x) * 2;
    ctx.fillStyle = item.color;
    ctx.font = "bold 16px monospace";
    ctx.textAlign = "center";
    ctx.fillText(item.ch, item.x * TILE + TILE / 2, item.y * TILE + TILE / 2 + 5 + bob);
  });

  // Draw enemies
  enemies.forEach(e => {
    if (!e.alive || !isInFOV(e.x, e.y)) return;
    const px = e.x * TILE, py = e.y * TILE;

    // Shadow
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.fillRect(px + 4, py + TILE - 4, TILE - 8, 4);

    // Body
    ctx.fillStyle = e.color;
    ctx.font = "bold 18px monospace";
    ctx.textAlign = "center";
    ctx.fillText(e.ch, px + TILE / 2, py + TILE / 2 + 6);

    // HP bar
    if (e.hp < e.maxHp) {
      const barW = TILE - 4;
      const hpPct = e.hp / e.maxHp;
      ctx.fillStyle = "rgba(0,0,0,0.5)";
      ctx.fillRect(px + 2, py - 3, barW, 3);
      ctx.fillStyle = hpPct > 0.5 ? "#10b981" : hpPct > 0.25 ? "#f59e0b" : "#ef4444";
      ctx.fillRect(px + 2, py - 3, barW * hpPct, 3);
    }
  });

  // Draw player
  const ppx = player.x * TILE, ppy = player.y * TILE;
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fillRect(ppx + 4, ppy + TILE - 4, TILE - 8, 4);
  ctx.fillStyle = "#e2e8f0";
  ctx.font = "bold 18px monospace";
  ctx.textAlign = "center";
  ctx.fillText("@", ppx + TILE / 2, ppy + TILE / 2 + 6);

  // FOV light effect
  const grad = ctx.createRadialGradient(
    ppx + TILE / 2, ppy + TILE / 2, TILE * 2,
    ppx + TILE / 2, ppy + TILE / 2, FOV_RADIUS * TILE
  );
  grad.addColorStop(0, "rgba(8,8,12,0)");
  grad.addColorStop(1, "rgba(8,8,12,0.85)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Floating texts
  floatingTexts.forEach(ft => {
    const alpha = ft.life / 40;
    ctx.globalAlpha = Math.min(1, alpha);
    ctx.fillStyle = ft.color;
    ctx.font = "bold 12px monospace";
    ctx.textAlign = "center";
    ctx.fillText(ft.text, ft.x, ft.y - (40 - ft.life) * 0.5);
  });
  ctx.globalAlpha = 1;

  // Death overlay
  if (gameState === "dead") {
    ctx.fillStyle = "rgba(8,8,12,0.8)";
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = "#ef4444";
    ctx.font = "bold 32px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText("YOU HAVE FALLEN", W / 2, H / 2 - 30);
    ctx.fillStyle = "#64748b";
    ctx.font = "14px monospace";
    ctx.fillText(`Floor ${player.floor} | Level ${player.level} | ${player.gold} Gold`, W / 2, H / 2 + 10);
    ctx.fillStyle = "#4a5568";
    ctx.font = "12px monospace";
    const blink = Math.sin(Date.now() * 0.004) > 0;
    if (blink) ctx.fillText("Press ENTER to try again", W / 2, H / 2 + 50);
  }

  // HUD update
  document.getElementById("hp").textContent = `${Math.max(0, player.hp)}/${player.maxHp}`;
  document.getElementById("atk").textContent = player.atk;
  document.getElementById("def").textContent = player.def;
  document.getElementById("lvl").textContent = player.level;
  document.getElementById("xp").textContent = `${player.xp}/${player.xpNext}`;
  document.getElementById("gold").textContent = player.gold;
  document.getElementById("floor").textContent = player.floor;
  document.getElementById("log").textContent = logMsg;
  document.getElementById("log").style.color = logTimer > 0 ? "#8a9ab5" : "#2d3748";
}

function drawTitle() {
  ctx.fillStyle = "#e2e8f0";
  ctx.font = "bold 36px 'Courier New', monospace";
  ctx.textAlign = "center";
  ctx.fillText("DUNGEON OF ECHOES", W / 2, 200);
  ctx.fillStyle = "#4a5568";
  ctx.font = "14px monospace";
  ctx.fillText("A Roguelike Adventure", W / 2, 235);

  ctx.fillStyle = "#64748b";
  ctx.font = "12px monospace";
  ctx.fillText("Procedurally generated dungeons", W / 2, 300);
  ctx.fillText("Turn-based combat | Items | Level progression", W / 2, 320);
  ctx.fillText("WASD or Arrow Keys to move | Bump to attack", W / 2, 355);

  ctx.fillStyle = "#3b82f6";
  const blink = Math.sin(Date.now() * 0.004) > 0;
  if (blink) ctx.fillText("Press ENTER to begin", W / 2, 410);

  ctx.fillStyle = "#2d3748";
  ctx.font = "10px monospace";
  ctx.fillText("Angel Nunez | Dungeon of Echoes v1.0", W / 2, 500);
}

// ── Input ──────────────────────────────
window.addEventListener("keydown", e => {
  if (gameState === "title") {
    if (e.key === "Enter") { gameState = "playing"; startGame(); }
    return;
  }
  if (gameState === "dead") {
    if (e.key === "Enter") { gameState = "playing"; startGame(); }
    return;
  }

  const moves = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
  };
  if (moves[e.key]) {
    e.preventDefault();
    movePlayer(...moves[e.key]);
  }
});

function startGame() {
  player = {
    x: 5, y: 5, hp: 20, maxHp: 20, atk: 5, def: 2,
    level: 1, xp: 0, xpNext: 10, gold: 0, floor: 1,
    inventory: [], keys: 0,
  };
  turnCount = 0;
  particles = [];
  floatingTexts = [];
  generateDungeon(1);
  computeFOV();
  setLog("You descend into the dungeon...");
}

// ── Game Loop ──────────────────────────
function loop() {
  // Update particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.03; p.life -= p.decay; });
  particles = particles.filter(p => p.life > 0);
  floatingTexts.forEach(ft => ft.life--);
  floatingTexts = floatingTexts.filter(ft => ft.life > 0);
  if (logTimer > 0) logTimer--;

  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
